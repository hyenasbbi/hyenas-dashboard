<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyenas Junio 2026</title>
<style>
body{margin:0;background:#070707;color:#f5f5f5;font-family:Arial}
header{padding:22px;border-bottom:1px solid #222}
h1{margin:0;font-size:24px}
.sub{color:#aaa;margin-top:6px}
.layout{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
aside{border-right:1px solid #222;padding:14px}
button{cursor:pointer}
.tab{width:100%;background:#111;color:white;border:1px solid #222;border-radius:14px;padding:12px;margin-bottom:8px;text-align:left;display:flex;justify-content:space-between}
.tab.active{border-color:#38bdf8;background:#082f49}
main{padding:22px}
.card{background:#111;border:1px solid #222;border-radius:16px;padding:16px;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.label{color:#aaa;font-size:13px}
.value{font-size:26px;font-weight:900;margin-top:6px}
.pill{padding:5px 9px;border-radius:999px;font-size:11px;font-weight:900}
.green{background:#16a34a;color:white}
.yellow{background:#facc15;color:#000}
.orange{background:#f97316;color:#000}
.red{background:#dc2626;color:white}
table{width:100%;border-collapse:collapse;background:#111;border-radius:16px;overflow:hidden}
th,td{padding:11px;border-bottom:1px solid #222;text-align:left}
th{color:#aaa;background:#0d0d0d}
textarea{width:100%;height:360px;background:#050505;color:white;border:1px solid #333;border-radius:12px;padding:12px}
.admin{display:none}
body.edit .admin{display:block}
@media(max-width:800px){.layout{grid-template-columns:1fr}.grid{grid-template-columns:1fr 1fr}aside{border-right:0;border-bottom:1px solid #222}}
</style>
</head>
<body>

<header>
<h1>Dashboard Hyenas — Junio 2026</h1>
<div class="sub">Último dato cargado: 05/06 · Meta: 100 acciones por día hábil · Esperado actual: 500 acciones</div>
</header>

<div class="layout">
<aside id="tabs"></aside>
<main>
<section id="view"></section>

<section class="admin card">
<h3>Editor interno</h3>
<div class="sub">Abrir con <b>?edit=1</b> para editar datos.</div>
<textarea id="editor"></textarea>
<button onclick="saveData()">Guardar cambios</button>
<button onclick="resetData()">Restaurar base</button>
</section>
</main>
</div>

<script>

const LAST_LOADED_DATE = "2026-06-05";

  sem3: 5,
  sem4: 5,
  sem5: 2

const CURRENT_EXPECTED = 500;

const BASE = [
  {

  {

  },

  },
  {
    alias:"Torna",
    name:"Agustin Tornavacio",
    account:"thomas.f.russ",
    billingGoal:1000,
    billed:0,
    actions:{sem1:250,sem2:0,sem3:0,sem4:0,sem5:0}
  },
  {
    alias:"Lio",
    name:"Lionel Zicavo",
    account:"edwardrodriguez.ok",
    billingGoal:500,
    billed:0,
    actions:{sem1:202,sem2:0,sem3:0,sem4:0,sem5:0}
  },
  {
    alias:"Tomson",
    name:"Tomas Maximiliano Aebi",
    account:"christianno06",
    billingGoal:3750,
    billed:0,
    actions:{sem1:109,sem2:0,sem3:0,sem4:0,sem5:0}
  }
];

let data = JSON.parse(localStorage.getItem("hyenas_junio_2026")) || BASE;
let selected = 0;

if(new URLSearchParams(location.search).get("edit")==="1"){
  document.body.classList.add("edit");
}

function totalActions(s){
  return Object.values(s.actions).reduce((a,b)=>a+Number(b),0);
}

function pct(a,b){
  return b ? ((a/b)*100).toFixed(1)+"%" : "0%";
}

function money(n){
  return "$ "+Number(n).toLocaleString("en-US")+" USD";
}

function status(value, goal){
  const p = goal ? value/goal*100 : 0;
  if(p>=100)return ["VERDE","green"];
  if(p>=80)return ["AMARILLO","yellow"];
  if(p>=60)return ["NARANJA","orange"];
  return ["ROJO","red"];
}

function renderTabs(){
  document.getElementById("tabs").innerHTML = data.map((s,i)=>{
    const total = totalActions(s);
    const st = status(total,CURRENT_EXPECTED);
    return `<button class="tab ${i===selected?'active':''}" onclick="selectSeller(${i})">
      <span><b>${s.alias}</b><br><small>${s.name}</small></span>
      <span class="pill ${st[1]}">${st[0]}</span>
    </button>`;
  }).join("");
}

function renderView(){
  const s = data[selected];
  const total = totalActions(s);
  const debt = Math.max(CURRENT_EXPECTED-total,0);
  const diff = total-CURRENT_EXPECTED;
  const st = status(total,CURRENT_EXPECTED);
  const billDebt = Math.max(s.billingGoal-s.billed,0);
  const billSt = status(s.billed,s.billingGoal);

  document.getElementById("view").innerHTML = `
    <div class="card">
      <h2>${s.alias} — ${s.name}</h2>
      <div class="sub">Cuenta: ${s.account}</div>
    </div>

    <div class="grid">
      <div class="card"><div class="label">Total acciones</div><div class="value">${total}</div></div>
      <div class="card"><div class="label">Debería tener</div><div class="value">${CURRENT_EXPECTED}</div></div>
      <div class="card"><div class="label">Diferencia</div><div class="value">${diff}</div></div>
      <div class="card"><div class="label">Estado acciones</div><div class="value"><span class="pill ${st[1]}">${st[0]}</span></div></div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Semana</th>
          <th>Acciones</th>
          <th>Meta semana</th>
          <th>Diferencia</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>Semana 1<br><small>1 al 5 junio</small></td><td>${s.actions.sem1}</td><td>500</td><td>${s.actions.sem1-500}</td></tr>
        <tr><td>Semana 2<br><small>8 al 12 junio</small></td><td>${s.actions.sem2}</td><td>500</td><td>${s.actions.sem2-500}</td></tr>
        <tr><td>Semana 3<br><small>15 al 19 junio</small></td><td>${s.actions.sem3}</td><td>500</td><td>${s.actions.sem3-500}</td></tr>
        <tr><td>Semana 4<br><small>22 al 26 junio</small></td><td>${s.actions.sem4}</td><td>500</td><td>${s.actions.sem4-500}</td></tr>
        <tr><td>Semana 5<br><small>29 al 30 junio</small></td><td>${s.actions.sem5}</td><td>200</td><td>${s.actions.sem5-200}</td></tr>
      </tbody>
    </table>

    <div class="grid" style="margin-top:14px">
      <div class="card"><div class="label">Facturado</div><div class="value">${money(s.billed)}</div></div>
      <div class="card"><div class="label">Meta facturación</div><div class="value">${money(s.billingGoal)}</div></div>
      <div class="card"><div class="label">Saldo pendiente</div><div class="value">${money(billDebt)}</div></div>
      <div class="card"><div class="label">Estado facturación</div><div class="value"><span class="pill ${billSt[1]}">${billSt[0]}</span></div></div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Indicador</th>
          <th>Actual</th>
          <th>Meta</th>
          <th>Cumplimiento</th>
          <th>Debe</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>Acciones al 05/06</td><td>${total}</td><td>${CURRENT_EXPECTED}</td><td>${pct(total,CURRENT_EXPECTED)}</td><td>${debt}</td></tr>
        <tr><td>Facturación</td><td>${money(s.billed)}</td><td>${money(s.billingGoal)}</td><td>${pct(s.billed,s.billingGoal)}</td><td>${money(billDebt)}</td></tr>
      </tbody>
    </table>
  `;

  document.getElementById("editor").value = JSON.stringify(data,null,2);
}

function selectSeller(i){
  selected=i;
  render();
}

function saveData(){
  try{
    data = JSON.parse(document.getElementById("editor").value);
    localStorage.setItem("hyenas_junio_2026",JSON.stringify(data));
    selected=0;
    render();
    alert("Datos guardados");
  }catch(e){
    alert("JSON inválido");
  }
}

function resetData(){
  localStorage.removeItem("hyenas_junio_2026");
  data = BASE;
  selected=0;
  render();
}

function render(){
  renderTabs();
  renderView();
}

render();
</script>
</body>
</html>
